<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a3f6f"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </radialGradient>
    <radialGradient id="avatarGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4b76a"/>
      <stop offset="100%" stop-color="#a8832a"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.3)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGrad)" rx="16"/>
  <!-- Ambient glow -->
  <ellipse cx="280" cy="80" rx="160" ry="120" fill="rgba(201,168,76,0.12)" filter="url(#softBlur)"/>
  <ellipse cx="80" cy="420" rx="120" ry="100" fill="rgba(255,255,255,0.04)" filter="url(#softBlur)"/>
  <!-- Glass frame -->
  <rect x="8" y="8" width="384" height="484" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="14"/>
  <rect x="12" y="12" width="376" height="476" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="0.5" rx="12"/>
  <!-- Specular highlight top -->
  <rect x="8" y="8" width="384" height="2" fill="rgba(255,255,255,0.25)" rx="14"/>
  <!-- Avatar circle -->
  <circle cx="200" cy="185" r="85" fill="url(#avatarGrad)"/>
  <!-- Avatar highlight -->
  <ellipse cx="172" cy="158" rx="30" ry="20" fill="rgba(255,255,255,0.18)"/>
  <!-- Initials -->
  <text x="200" y="202" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="rgba(26,42,74,0.9)">BOA</text>
  <!-- Body silhouette -->
  <ellipse cx="200" cy="420" rx="130" ry="90" fill="rgba(201,168,76,0.75)"/>
  <!-- Body highlight -->
  <ellipse cx="165" cy="395" rx="40" ry="25" fill="rgba(255,255,255,0.12)"/>
  <!-- Replace placeholder note -->
  <text x="200" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">Replace with professional photo</text>
</svg>
